<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRM Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<div id="loginBox" class="login-box">
  <h2>Admin Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
      padding: 30px 0;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #22c55e;
    }

    .lead-name {
      font-size: 18px;
      font-weight: 600;
      color: #22c55e;
    }

    .meta {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 20px;
      background: rgba(34,197,94,0.2);
      color: #22c55e;
      margin-top: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    button {
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div class="title">CRM Admin Dashboard</div>
  <button onclick="loadLeads()">Refresh</button>
</header>

<div class="container">

  <div class="top-bar">
    <h2>All Leads</h2>
    <span id="count">0 Leads</span>
  </div>

  <div id="leads" class="grid"></div>

</div>

<script>
  async function loadLeads() {
    const res = await fetch("http://localhost:5000/api/leads");
    const data = await res.json();

    const container = document.getElementById("leads");
    const count = document.getElementById("count");

    container.innerHTML = "";
    count.innerText = data.length + " Leads";

    data.reverse().forEach(lead => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="lead-name">${lead.name}</div>
        <div class="meta">${lead.email} • ${lead.service}</div>
        <div class="meta">📅 ${lead.date}</div>
        <div class="message">${lead.message}</div>
        <div class="badge">${lead.status || "new"}</div>
      `;

      container.appendChild(card);
    });
  }

  loadLeads();
</script>

</body>
</html>
